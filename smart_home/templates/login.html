<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Security - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>&#128274; Smart Home Security</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="camera.html">Live Camera</a>
            </nav>
        </div>
    </header>

    <main class="login-container">
        <section class="login-form">
            <div class="login-header">
                <div class="login-icon">&#128274;</div>
                <h2>Welcome Back</h2>
                <p>Sign in to access your security dashboard</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <div class="role-options">
                        <label class="role-chip">
                            <input type="radio" name="role" value="admin" checked> Admin
                        </label>
                        <label class="role-chip">
                            <input type="radio" name="role" value="public"> Public User
                        </label>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="btn-primary btn-full">Login</button>
            </form>
            <div class="login-message" id="loginMessage"></div>
            <p class="login-link">Don't have an account? <a href="register.html">Register</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Smart Home Security System</p>
    </footer>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
